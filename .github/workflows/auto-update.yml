name: 自动抓取更新

on:
  workflow_dispatch:    # GitHub 页面手动触发
    inputs:
      field:
        description: '学科（留空则全部）'
        required: false
        default: ''
      max_results:
        description: '每学科抓取篇数'
        required: false
        default: '3'
  schedule:
    - cron: '0 2 * * 1'  # 每周一 UTC 2:00 自动运行

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 抓取论文
        run: |
          FIELDS="${{ github.event.inputs.field || '物理 天文 生物 计算机 心理 哲学' }}"
          for field in $FIELDS; do
            echo "=== 正在抓取 $field ==="
            python scripts/fetch_papers.py --field "$field" --max-results ${{ github.event.inputs.max_results || '3' }} --output /tmp/$field.json
          done

      - name: 生成 AI 点评
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "⚠️ 未设置 DEEPSEEK_API_KEY，跳过 AI 生成"
            exit 0
          fi
          for f in /tmp/*.json; do
            field=$(basename "$f" .json)
            count=$(python -c "import json; d=json.load(open('$f')); print(len(d.get('papers',[])))")
            for i in $(seq 0 $((count - 1))); do
              echo "生成 $field [$i/$count]..."
              python scripts/generate_review.py \
                --input "$f" --index $i \
                --model deepseek --output "/tmp/entry_${field}_${i}.json"
              python scripts/merge_entry.py --input "/tmp/entry_${field}_${i}.json"
            done
          done

      - name: 提交更新
        run: |
          git config user.name "Research Bot"
          git config user.email "bot@research-frontiers"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: 自动更新 $(date +%Y-%m-%d)"
          git push
